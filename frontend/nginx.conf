server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API + WebSocket to the backend so the SPA is same-origin.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /health {
        proxy_pass http://backend:8080;
    }

    # Service worker: must be served from the root scope with no-cache headers
    # so browsers always get the latest SW version after a deploy.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Web App Manifest: short-lived cache is fine; no-store prevents stale installs.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
