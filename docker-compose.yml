# One-command Stratum — pulls the published multi-arch images from GHCR.
#
#   cp .env.example .env      # then set JWT_SECRET + ENCRYPTION_KEY
#   docker compose up -d
#
# Pin a release (recommended in production; defaults to :latest):
#   STRATUM_TAG=v0.1.0 docker compose up -d
#
# Build from source instead of pulling images:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
services:
  backend:
    image: ghcr.io/kaylaehman/stratum-backend:${STRATUM_TAG:-latest}
    environment:
      PORT: "8080"
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DATABASE_URL: sqlite:///data/stratum.db
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      # Optional: point at a host trivy binary for CVE scanning (the published
      # backend image is slim and ships without Trivy).
      TRIVY_PATH: ${TRIVY_PATH:-}
    volumes:
      - stratum-data:/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/kaylaehman/stratum-frontend:${STRATUM_TAG:-latest}
    ports:
      - "${STRATUM_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  stratum-data:
