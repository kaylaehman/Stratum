name: Release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds multi-arch (amd64 + arm64) images, pushes them to GHCR as
# ghcr.io/kae-labs/stratum-{backend,frontend}, and opens a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            target: app # slim image (no Trivy); set TRIVY_PATH or use app-trivy for bundled CVE scan
            image: ghcr.io/kae-labs/stratum-backend
          - name: frontend
            dockerfile: frontend/Dockerfile
            target: "" # default (final) stage
            image: ghcr.io/kae-labs/stratum-frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so release notes diff against the previous tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          body: |
            ## Stratum ${{ github.ref_name }}

            Self-hosted unified infrastructure management. Pull the published images:

            ```bash
            curl -O https://raw.githubusercontent.com/KAE-Labs/Stratum/${{ github.ref_name }}/docker-compose.yml
            curl -O https://raw.githubusercontent.com/KAE-Labs/Stratum/${{ github.ref_name }}/.env.example
            cp .env.example .env   # then set JWT_SECRET + ENCRYPTION_KEY
            STRATUM_TAG=${{ github.ref_name }} docker compose up -d
            ```

            Images (multi-arch amd64/arm64):
            - `ghcr.io/kae-labs/stratum-backend:${{ github.ref_name }}`
            - `ghcr.io/kae-labs/stratum-frontend:${{ github.ref_name }}`
