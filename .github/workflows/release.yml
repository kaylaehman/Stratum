name: Release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds multi-arch (amd64 + arm64) images, pushes them to GHCR as
# ghcr.io/kae-labs/stratum-{backend,frontend}, and opens a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            target: app # slim image (no Trivy); set TRIVY_PATH or use app-trivy for bundled CVE scan
            image: ghcr.io/kae-labs/stratum-backend
          - name: frontend
            dockerfile: frontend/Dockerfile
            target: "" # default (final) stage
            image: ghcr.io/kae-labs/stratum-frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0 # full history so release notes diff against the previous tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          body: |
            ## Stratum ${{ github.ref_name }}

            Self-hosted unified infrastructure management. Pull the published images:

            ```bash
            curl -O https://raw.githubusercontent.com/KAE-Labs/Stratum/${{ github.ref_name }}/docker-compose.yml
            curl -O https://raw.githubusercontent.com/KAE-Labs/Stratum/${{ github.ref_name }}/.env.example
            cp .env.example .env   # then set JWT_SECRET + ENCRYPTION_KEY
            STRATUM_TAG=${{ github.ref_name }} docker compose up -d
            ```

            Images (multi-arch amd64/arm64):
            - `ghcr.io/kae-labs/stratum-backend:${{ github.ref_name }}`
            - `ghcr.io/kae-labs/stratum-frontend:${{ github.ref_name }}`
