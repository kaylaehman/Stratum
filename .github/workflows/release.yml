name: Release

# Releases are CUT AUTOMATICALLY — no manual tagging. After CI passes on main,
# this reads the conventional-commit messages since the last tag and computes the
# next semver (feat -> minor; fix/security/perf -> patch; BREAKING CHANGE -> major;
# chore/docs/ci/style/test/refactor -> NO release), tags it, builds + pushes the
# multi-arch images to GHCR, and opens the GitHub Release. Gated on green CI so a
# broken main can never ship.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write # push the tag + create the GitHub Release
  packages: write # push images to GHCR

jobs:
  tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: false # no release unless feat/fix/security/perf/BREAKING
          custom_release_rules: security:patch:Security,perf:patch:Performance

  images:
    needs: tag
    if: ${{ needs.tag.outputs.tag }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            target: app
            image: ghcr.io/kae-labs/stratum-backend
          - name: frontend
            dockerfile: frontend/Dockerfile
            target: ""
            image: ghcr.io/kae-labs/stratum-frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.tag.outputs.version }}
            ${{ matrix.image }}:latest

  release:
    needs: [tag, images]
    if: ${{ needs.tag.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
