name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: vet
        working-directory: backend
        run: go vet ./...
      - name: staticcheck
        working-directory: backend
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: test (race)
        working-directory: backend
        run: go test -race ./...

  agent:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - name: build
        working-directory: agent
        run: go build ./...
      - name: vet
        working-directory: agent
        run: go vet ./...
      - name: test
        working-directory: agent
        run: go test ./...

  proto:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.70.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: lint
        working-directory: proto
        run: buf lint
      - name: generate is up to date
        working-directory: proto
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          buf generate
          git diff --exit-code
      - name: build
        working-directory: proto
        run: go build ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: install
        working-directory: frontend
        run: npm ci
      - name: typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: lint
        working-directory: frontend
        run: npm run lint
      - name: test
        working-directory: frontend
        run: npm run test
      - name: build
        working-directory: frontend
        run: npm run build

  # Playwright smoke (login -> resource tree). Non-blocking: it needs a running
  # full stack, so it never gates the pipeline.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: install
        working-directory: frontend
        run: npm ci
      - name: install browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: smoke
        working-directory: frontend
        run: npm run test:e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: build backend image
        run: docker build -f backend/Dockerfile -t stratum-backend .
      - name: build frontend image
        run: docker build -f frontend/Dockerfile -t stratum-frontend .
