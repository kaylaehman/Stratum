id: deluge
name: Deluge
version: "1.0"
container_match:
  image_patterns:
    - "linuxserver/deluge"
  port_hints: [8112, 58846, 6881]
category: torrent
description: Full-featured BitTorrent client with web UI and plugin architecture
docs_url: https://hub.docker.com/r/linuxserver/deluge

common_issues:
  - id: permission-denied-config
    name: Permission denied on /config mount
    symptoms:
      - "permission denied"
      - "EACCES"
      - "Cannot create directory in /config"
      - "Failed to write configuration"
    trigger_conditions:
      - log_pattern: "permission denied.*config"
    steps:
      - id: step-1
        description: Check current ownership of the host config path
        type: check
        command: "stat {config_path}"
        expected_output: "Uid: {puid}"
        on_fail: step-2
      - id: step-2
        description: Display current ownership for diagnosis
        type: inform
        command: ""
      - id: step-3
        description: Recursively chown the config path to PUID:PGID
        type: fix
        command: "chown -R {puid}:{pgid} {config_path}"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Verify ownership was corrected
        type: check
        command: "stat {config_path} | grep Uid"
        expected_output: "Uid: {puid}"
    resolution: |
      /config ownership was mismatched with the container's UID/GID. Deluge could not write its settings or resume data. Ownership has been corrected to {puid}:{pgid}.

  - id: import-failed-permissions
    name: Download files inaccessible - permission denied
    symptoms:
      - "Permission denied"
      - "Cannot read file"
      - "EACCES when accessing downloads"
      - "Torrent data not accessible"
    trigger_conditions:
      - log_pattern: "permission denied"
      - log_pattern: "cannot.*read"
    steps:
      - id: step-1
        description: Check ownership of the downloads directory
        type: check
        command: "stat {downloads_path}"
        expected_output: "Uid: {puid}"
        on_fail: step-2
      - id: step-2
        description: Check permissions on downloads directory
        type: check
        command: "stat -c '%a' {downloads_path}"
        expected_output: ""
        on_fail: step-3
      - id: step-3
        description: Display downloads directory ownership and permissions
        type: inform
        command: ""
      - id: step-4
        description: Recursively chown downloads to match Deluge's UID/GID
        type: fix
        command: "chown -R {puid}:{pgid} {downloads_path}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Set readable/writable permissions on downloads directory
        type: fix
        command: "chmod -R 755 {downloads_path}"
        requires_approval: true
    resolution: |
      Deluge could not access download files because the /downloads directory
      had incorrect ownership or permissions. Ownership has been corrected to {puid}:{pgid}
      and permissions set to 755 (rwxr-xr-x). Deluge can now access and manage torrent files.

  - id: connection-refused-web-ui
    name: Cannot reach Deluge web UI on port 8112
    symptoms:
      - "Connection refused"
      - "Cannot reach Deluge at localhost:8112"
      - "Bad gateway"
      - "Web UI not responding"
    trigger_conditions:
      - log_pattern: "connection refused"
    steps:
      - id: step-1
        description: Check Deluge is listening on port 8112
        type: check
        command: "docker exec {container_name} ss -tlnp 2>/dev/null | grep 8112"
        expected_output: "LISTEN"
        on_fail: step-2
      - id: step-2
        description: Verify the port is published
        type: check
        command: "docker inspect {container_name} | grep -A 3 8112"
        expected_output: "8112"
        on_fail: step-3
      - id: step-3
        description: Check Deluge daemon is running
        type: check
        command: "docker exec {container_name} ps aux | grep -i deluge"
        expected_output: "deluge"
        on_fail: step-4
      - id: step-4
        description: Restart Deluge to recover
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
    resolution: |
      Deluge was restarted. Confirm it is reachable at http://host:8112. If
      not, verify the web UI port (8112) is exposed in the compose file and
      not blocked by a host firewall.

  - id: port-conflict-peer
    name: Peer connection port (58846) not reachable from outside
    symptoms:
      - "Low number of peers"
      - "NAT/firewall detected"
      - "Port mapping failed"
      - "Incoming peer connections not established"
    trigger_conditions:
      - log_pattern: "port.*unreachable"
      - log_pattern: "nat.*firewall"
    steps:
      - id: step-1
        description: Inform about port forwarding requirements
        type: inform
        command: ""
      - id: step-2
        description: Check if Deluge is listening on the peer port (58846)
        type: check
        command: "docker exec {container_name} ss -tlnp 2>/dev/null | grep 58846"
        expected_output: "LISTEN"
        on_fail: step-3
      - id: step-3
        description: Verify the peer port is published in compose
        type: check
        command: "docker inspect {container_name} | grep -A 3 58846"
        expected_output: "58846"
      - id: step-4
        description: Inform about external port forwarding
        type: inform
        command: ""
    resolution: |
      Deluge's peer connection port (58846) must be reachable from outside your
      network for optimal performance. If behind a NAT/firewall:
      1. Forward external port 58846 → container port 58846 on your host
      2. Configure Deluge to use port 58846 in Settings → Network
      3. Enable UPnP/NAT-PMP if supported by your router
      Incoming connections will improve peer discovery and speeds.

default_config:
  compose_template: |
    services:
      deluge:
        image: linuxserver/deluge:latest
        container_name: deluge
        restart: unless-stopped
        environment:
          PUID: ${PUID:-1000}
          PGID: ${PGID:-1000}
          TZ: ${TZ:-UTC}
          DELUGE_LOGLEVEL: info
        volumes:
          - ${CONFIG_PATH:-./config}:/config
          - ${DOWNLOADS_PATH:-./downloads}:/downloads
        ports:
          - "8112:8112/tcp"
          - "58846:58846/tcp"
          - "6881:6881/udp"
  required_vars:
    - name: PUID
      description: User ID to run Deluge as
      default: "1000"
    - name: PGID
      description: Group ID for Deluge
      default: "1000"
    - name: TZ
      description: Timezone
      default: "UTC"
    - name: CONFIG_PATH
      description: Host path for /config (settings, plugins, resume data)
      default: "./config"
    - name: DOWNLOADS_PATH
      description: Host path for /downloads (completed torrents)
      default: "./downloads"
  known_mounts:
    - container_path: /config
      purpose: Deluge configuration, plugin cache, and resume data
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"
    - container_path: /downloads
      purpose: Torrent download destination
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"

linuxserver_conventions:
  enabled: true
  puid_env: PUID
  pgid_env: PGID
  config_mount: /config

notes: |
  Port mapping: Deluge uses three port types:
  - 8112/tcp: Web UI (remote access)
  - 58846/tcp: Peer connections (for torrent data transfer)
  - 6881/udp: DHT (Distributed Hash Table, optional for peer discovery)

  For best performance, expose all three. The peer port (58846) must be accessible
  from outside your network via port forwarding or UPnP.

  Plugin support: Deluge plugins live in /config/plugins/. Plugins are loaded
  on startup, so container restart required after adding new plugins.

  Authentication: Deluge web UI is protected by default. Initial password is
  set in /config/deluge/auth. Change it in Settings → Preferences.

  UID/GID parity: downloads must be writable by the container's UID/GID
  for proper file management and seeding.
