id: nocodb
name: NocoDB
version: "1.0"
container_match:
  image_patterns:
    - "nocodb/nocodb"
  port_hints: [8080]
category: data
description: Open-source Airtable alternative for creating and managing databases with spreadsheet-like UI
docs_url: https://hub.docker.com/r/nocodb/nocodb

common_issues:
  - id: database-initialization-failed
    name: Database initialization failed on startup
    symptoms:
      - "Connection failed: NC_DB not configured"
      - "SQLite database cannot be created"
      - "Cannot initialize metadata database"
      - "Connection pool error on startup"
    trigger_conditions:
      - log_pattern: "database.*initialization"
      - log_pattern: "NC_DB"
    steps:
      - id: step-1
        description: Check NC_DB environment variable
        type: check
        command: "docker inspect {container_name} --format='{{range .Config.Env}}{{println .}}{{end}}' | grep NC_DB"
        expected_output: "NC_DB"
        on_fail: step-2
      - id: step-2
        description: Display current database configuration
        type: inform
        command: ""
      - id: step-3
        description: Verify database path or connection string validity
        type: check
        command: "docker exec {container_name} test -d /data && echo 'Data directory exists' || echo 'Data directory missing'"
        expected_output: "exists"
        on_fail: step-4
      - id: step-4
        description: Display database directory status
        type: inform
        command: ""
      - id: step-5
        description: Ensure /data directory has correct ownership
        type: fix
        command: "chmod 755 /data && chown -R 1000:1000 /data"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Restart NocoDB to reinitialize database
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-7
      - id: step-7
        description: Monitor initialization logs
        type: check
        command: "sleep 10 && docker logs {container_name} | grep -i 'database\\|initialized\\|listening' | tail -5"
    resolution: |
      NocoDB uses NC_DB to specify its metadata database. By default it creates a SQLite database in /data directory. If NC_DB is not set or the /data volume is not properly mounted, initialization will fail. The container has been restarted with corrected permissions. NocoDB should now initialize its metadata database and be accessible.

  - id: missing-postgres-connection
    name: PostgreSQL backend database connection failed
    symptoms:
      - "Cannot connect to PostgreSQL database"
      - "Connection refused: postgres service"
      - "NC_DB_URL_MYSQL or NC_DB_URL_PG not working"
      - "Invalid database credentials"
    trigger_conditions:
      - log_pattern: "postgres.*connection"
      - log_pattern: "pg.*error"
    steps:
      - id: step-1
        description: Check PostgreSQL connection environment variables
        type: check
        command: "docker inspect {container_name} --format='{{range .Config.Env}}{{println .}}{{end}}' | grep NC_DB_URL"
        expected_output: "NC_DB_URL"
        on_fail: step-2
      - id: step-2
        description: Display current database URL configuration
        type: inform
        command: ""
      - id: step-3
        description: Test PostgreSQL connectivity from container
        type: check
        command: "docker exec {container_name} timeout 5 bash -c \"echo > /dev/tcp/{pg_host}/5432\" && echo 'PostgreSQL reachable' || echo 'PostgreSQL unreachable'"
        expected_output: "reachable"
        on_fail: step-4
      - id: step-4
        description: Display PostgreSQL host and port from config
        type: inform
        command: ""
      - id: step-5
        description: Verify PostgreSQL database exists and credentials are correct
        type: check
        command: "docker exec {container_name} PGPASSWORD={pg_password} psql -h {pg_host} -U {pg_user} -d {pg_db} -c 'SELECT version();' 2>&1 | head -1"
        expected_output: ""
      - id: step-6
        description: Restart NocoDB to reconnect to PostgreSQL
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-7
      - id: step-7
        description: Monitor connection logs
        type: check
        command: "sleep 10 && docker logs {container_name} | grep -i 'postgres\\|connected\\|listening' | tail -5"
    resolution: |
      NocoDB can use PostgreSQL (or MySQL) as a backend database instead of SQLite. Ensure NC_DB_URL_PG (for PostgreSQL) or NC_DB_URL_MYSQL (for MySQL) is set with valid credentials and the database server is reachable. The container has been restarted to attempt reconnection.

  - id: permission-denied-data-volume
    name: Permission denied writing to /data volume
    symptoms:
      - "Permission denied: /data/nc"
      - "Cannot write metadata"
      - "EACCES error on startup"
      - "Failed to create database file"
    trigger_conditions:
      - log_pattern: "permission denied.*data"
      - log_pattern: "EACCES"
    steps:
      - id: step-1
        description: Check /data directory ownership
        type: check
        command: "stat {data_path} | grep Uid"
        expected_output: "Uid:"
        on_fail: step-2
      - id: step-2
        description: Display current /data ownership and permissions
        type: inform
        command: ""
      - id: step-3
        description: Recursively chown /data to UID 1000
        type: fix
        command: "chown -R 1000:1000 {data_path}"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Set /data directory permissions to 755
        type: fix
        command: "chmod -R 755 {data_path}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Restart NocoDB to verify data access
        type: check
        command: "docker restart {container_name} && sleep 5 && docker logs {container_name} | tail -10"
    resolution: |
      NocoDB runs as UID 1000 and requires write access to /data for its SQLite database and configuration. The /data directory ownership has been corrected and permissions have been set appropriately. The container has been restarted and should now be able to initialize its database.

  - id: unable-to-connect-ui
    name: Cannot connect to NocoDB web interface
    symptoms:
      - "Connection refused on port 8080"
      - "Cannot reach NocoDB UI"
      - "Service appears to be crashing on startup"
      - "404 error when accessing web interface"
    trigger_conditions:
      - log_pattern: "listening.*8080"
      - log_pattern: "error.*startup"
    steps:
      - id: step-1
        description: Check if NocoDB is listening on port 8080
        type: check
        command: "docker exec {container_name} ss -tlnp | grep 8080"
        expected_output: "8080"
        on_fail: step-2
      - id: step-2
        description: Display port binding status
        type: inform
        command: ""
      - id: step-3
        description: Check NocoDB startup logs for initialization errors
        type: check
        command: "docker logs {container_name} | grep -i 'error\\|fatal\\|crash' | head -10"
        expected_output: ""
      - id: step-4
        description: Check available disk space on /data volume
        type: check
        command: "docker exec {container_name} df -h /data | tail -1"
        expected_output: ""
      - id: step-5
        description: Restart NocoDB service
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Wait for service startup and verify accessibility
        type: check
        command: "sleep 10 && docker exec {container_name} curl -s http://localhost:8080/ | head -5"
    resolution: |
      NocoDB should be listening on port 8080 for incoming web connections. Common startup issues include permission problems with /data, database initialization errors, or insufficient disk space. The service has been restarted. Ensure the port mapping is correct (8080:8080) and firewall rules allow access. Try accessing the web interface again.

default_config:
  compose_template: |
    services:
      nocodb:
        image: nocodb/nocodb:latest
        container_name: nocodb
        restart: unless-stopped
        environment:
          NC_DB: ${NC_DB:-sqlite:///data/nc.db}
          NC_PUBLIC_URL: ${NC_PUBLIC_URL:-http://localhost:8080}
          NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:-changeme}
          NC_SMTP_HOST: ${NC_SMTP_HOST}
          NC_SMTP_PORT: ${NC_SMTP_PORT:-587}
          NC_SMTP_FROM: ${NC_SMTP_FROM}
          NC_SMTP_USERNAME: ${NC_SMTP_USERNAME}
          NC_SMTP_PASSWORD: ${NC_SMTP_PASSWORD}
        volumes:
          - ${DATA_PATH:-./data}:/data
        ports:
          - "8080:8080"
  required_vars:
    - name: NC_DB
      description: Database connection string (defaults to SQLite in /data)
      default: "sqlite:///data/nc.db"
    - name: NC_PUBLIC_URL
      description: Public URL for NocoDB (used for sharing bases and emails)
      default: "http://localhost:8080"
    - name: NC_AUTH_JWT_SECRET
      description: JWT secret for session authentication
      default: "changeme"
    - name: NC_SMTP_HOST
      description: SMTP server hostname (optional, for email notifications)
      default: ""
    - name: NC_SMTP_PORT
      description: SMTP server port
      default: "587"
    - name: NC_SMTP_FROM
      description: From address for SMTP emails
      default: ""
    - name: NC_SMTP_USERNAME
      description: SMTP authentication username
      default: ""
    - name: NC_SMTP_PASSWORD
      description: SMTP authentication password
      default: ""
  known_mounts:
    - container_path: /data
      purpose: SQLite database and NocoDB configuration (when using default SQLite backend)
      recommended_permissions: "755"
      owner: "1000:1000"

linuxserver_conventions:
  enabled: false

notes: |
  NocoDB is an open-source Airtable alternative that provides a spreadsheet-like interface for managing databases.

  Database backends: By default, NocoDB uses SQLite stored in /data directory. For production or multi-user deployments, configure PostgreSQL or MySQL via NC_DB environment variable. Connection string format: postgresql://user:password@host:5432/dbname

  Public URL: Set NC_PUBLIC_URL to the external URL where NocoDB will be accessed. This is used for share links and email notifications.

  JWT Secret: NC_AUTH_JWT_SECRET should be a secure random string. Generate with: openssl rand -base64 32

  Email/SMTP: Optional. Configure SMTP settings for sending email notifications for base sharing and user invitations.

  Backups: When using SQLite, backup the /data directory to preserve all databases and configuration. For PostgreSQL/MySQL, use standard database backup procedures.

  Permissions and ownership: NocoDB runs as UID 1000. Ensure /data volume is owned by 1000:1000 and is writable.

  Common gotchas:
  - SQLite locked error: Multiple NocoDB instances should not share the same SQLite file. Use PostgreSQL for multi-instance deployments.
  - NC_DB not set: Defaults to SQLite, but ensure /data volume is mounted and writable.
  - JWT secret missing: Session authentication will fail. Set NC_AUTH_JWT_SECRET to a secure random value.
  - Share links not working: Verify NC_PUBLIC_URL is set to the external URL and is reachable from client network.
