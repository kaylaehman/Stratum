id: radarr
name: Radarr
version: "1.0"
container_match:
  image_patterns:
    - "linuxserver/radarr"
  port_hints: [7878]
category: media
description: Movie collection manager that monitors releases and automates download and import
docs_url: https://hub.docker.com/r/linuxserver/radarr

common_issues:
  - id: permission-denied-config
    name: Permission denied on /config mount
    symptoms:
      - "permission denied"
      - "EACCES"
      - "Cannot create directory in /config"
      - "Failed to write database"
    trigger_conditions:
      - log_pattern: "permission denied.*config"
    steps:
      - id: step-1
        description: Check current ownership of the host config path
        type: check
        command: "stat {config_path}"
        expected_output: "Uid: {puid}"
        on_fail: step-2
      - id: step-2
        description: Display current ownership
        type: inform
        command: ""
      - id: step-3
        description: Recursively chown the config path to PUID:PGID
        type: fix
        command: "chown -R {puid}:{pgid} {config_path}"
        requires_approval: true
    resolution: |
      /config ownership was mismatched with the container's UID/GID. Radarr
      could not write its database or settings. Ownership corrected to
      {puid}:{pgid}.

  - id: import-failed-permissions
    name: Import failed - permission denied on downloads or movies
    symptoms:
      - "Import failed"
      - "Could not move file"
      - "Access to the path is denied"
    trigger_conditions:
      - log_pattern: "import.*failed"
      - log_pattern: "access.*denied"
    steps:
      - id: step-1
        description: Check ownership of downloads directory
        type: check
        command: "stat {downloads_path}"
        expected_output: "Uid: {puid}"
        on_fail: step-2
      - id: step-2
        description: Check ownership of movies library
        type: check
        command: "stat {movies_path}"
        expected_output: "Uid: {puid}"
        on_fail: step-3
      - id: step-3
        description: Display both paths' ownership
        type: inform
        command: ""
      - id: step-4
        description: Recursively chown both paths to PUID:PGID
        type: fix
        command: "chown -R {puid}:{pgid} {downloads_path} {movies_path}"
        requires_approval: true
    resolution: |
      Radarr could not move downloaded movies into the library because the
      directories were owned by a different user. Ownership corrected to
      {puid}:{pgid}.

  - id: connection-refused
    name: Cannot reach Radarr on port 7878
    symptoms:
      - "Connection refused"
      - "Cannot reach Radarr at localhost:7878"
      - "Bad gateway"
    trigger_conditions:
      - log_pattern: "connection refused"
    steps:
      - id: step-1
        description: Check Radarr is listening on port 7878
        type: check
        command: "docker exec {container_name} ss -tlnp 2>/dev/null | grep 7878"
        expected_output: "LISTEN"
        on_fail: step-2
      - id: step-2
        description: Verify the port is published
        type: check
        command: "docker inspect {container_name} | grep -A 3 7878"
        expected_output: "7878"
        on_fail: step-3
      - id: step-3
        description: Restart Radarr to recover
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
    resolution: |
      Radarr was restarted. Confirm it is reachable at http://host:7878. If
      not, verify the port is exposed and not blocked by a firewall.

  - id: indexer-no-results
    name: Indexer searches returning no results
    symptoms:
      - "0 indexer results"
      - "Search returned no results"
      - "All indexers reporting errors"
    trigger_conditions:
      - log_pattern: "no results"
    steps:
      - id: step-1
        description: Check Radarr's view of configured indexers
        type: check
        command: "docker logs {container_name} 2>&1 | grep -i 'indexer' | tail -10"
        expected_output: ""
      - id: step-2
        description: Inform about Prowlarr-based indexer sync
        type: inform
        command: ""
    resolution: |
      Indexer failures are most often API key or connectivity issues. If using
      Prowlarr, verify it is reachable and the sync is enabled in Prowlarr's
      Apps section. Otherwise, re-test each indexer in Settings → Indexers and
      check the indexer's status page for rate-limiting or outages.

default_config:
  compose_template: |
    services:
      radarr:
        image: linuxserver/radarr:latest
        container_name: radarr
        restart: unless-stopped
        environment:
          PUID: ${PUID:-1000}
          PGID: ${PGID:-1000}
          TZ: ${TZ:-UTC}
        volumes:
          - ${CONFIG_PATH:-./config}:/config
          - ${MOVIES_PATH:-./movies}:/movies
          - ${DOWNLOADS_PATH:-./downloads}:/downloads
        ports:
          - "7878:7878/tcp"
  required_vars:
    - name: PUID
      description: User ID to run Radarr as (must match download client and library)
      default: "1000"
    - name: PGID
      description: Group ID for Radarr
      default: "1000"
    - name: TZ
      description: Timezone
      default: "UTC"
    - name: CONFIG_PATH
      description: Host path for /config
      default: "./config"
    - name: MOVIES_PATH
      description: Host path for /movies library
      default: "./movies"
    - name: DOWNLOADS_PATH
      description: Host path for /downloads (must match download client's view)
      default: "./downloads"
  known_mounts:
    - container_path: /config
      purpose: Radarr settings and database
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"
    - container_path: /movies
      purpose: Movies library (write — Radarr renames/moves files here)
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"
    - container_path: /downloads
      purpose: Completed downloads from client
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"

linuxserver_conventions:
  enabled: true
  puid_env: PUID
  pgid_env: PGID
  config_mount: /config

notes: |
  Same path/UID parity gotchas as Sonarr. The /downloads path inside Radarr
  must be the same as inside the download client, and PUID/PGID must match
  across Radarr, the download client, and the movies library.

  Indexers in v3+ are typically managed through Prowlarr, which syncs them
  into Radarr automatically.
