id: jellyseerr
name: Jellyseerr
version: "1.0"
container_match:
  image_patterns:
    - "fallenbagel/jellyseerr"
  port_hints: [5055]
category: media
description: Jellyfin and Emby request management — fork of Overseerr
docs_url: https://hub.docker.com/r/fallenbagel/jellyseerr

common_issues:
  - id: permission-denied-config
    name: Permission denied on /app/config mount
    symptoms:
      - "permission denied"
      - "Cannot create db.sqlite3"
    trigger_conditions:
      - log_pattern: "permission denied"
    steps:
      - id: step-1
        description: Check ownership of the config mount
        type: check
        command: "stat {config_path}"
        expected_output: ""
        on_fail: step-2
      - id: step-2
        description: Recursively chown to configured UID/GID
        type: fix
        command: "chown -R {puid}:{pgid} {config_path}"
        requires_approval: true
    resolution: |
      /app/config ownership corrected. Jellyseerr can now persist its database.

  - id: jellyfin-sso-failed
    name: Jellyfin sign-in fails on first setup
    symptoms:
      - "Jellyfin authentication failed"
      - "Cannot reach Jellyfin"
      - "Invalid credentials despite correct password"
    trigger_conditions:
      - log_pattern: "jellyfin.*auth.*failed"
    steps:
      - id: step-1
        description: Test Jellyfin reachability from Jellyseerr
        type: check
        command: "docker exec {container_name} curl -sS -m 5 -o /dev/null -w '%{http_code}' http://{jellyfin_host}:{jellyfin_port}/System/Info 2>&1"
        expected_output: ""
      - id: step-2
        description: Inform about Jellyfin URL configuration
        type: inform
        command: ""
    resolution: |
      Use the container hostname on a shared Docker network (e.g.
      http://jellyfin:8096) rather than localhost. Jellyseerr asks for the
      Jellyfin admin username — case-sensitive — and the same password used
      to log into Jellyfin's web UI.

default_config:
  compose_template: |
    services:
      jellyseerr:
        image: fallenbagel/jellyseerr:latest
        container_name: jellyseerr
        restart: unless-stopped
        environment:
          PUID: ${PUID:-1000}
          PGID: ${PGID:-1000}
          TZ: ${TZ:-UTC}
          LOG_LEVEL: info
        volumes:
          - ${CONFIG_PATH:-./config}:/app/config
        ports:
          - "5055:5055/tcp"
  required_vars:
    - name: PUID
      description: User ID
      default: "1000"
    - name: PGID
      description: Group ID
      default: "1000"
    - name: TZ
      description: Timezone
      default: "UTC"
    - name: CONFIG_PATH
      description: Host path for /app/config
      default: "./config"
  known_mounts:
    - container_path: /app/config
      purpose: Jellyseerr settings and database
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"

linuxserver_conventions:
  enabled: false

notes: |
  Jellyseerr is a community fork of Overseerr adding Jellyfin/Emby support.
  Default port 5055 conflicts with Overseerr if both run — change one with
  PORT env or by remapping the host port.
