id: emby
name: Emby Media Server
version: "1.0"
container_match:
  image_patterns:
    - "emby/embyserver"
    - "linuxserver/emby"
  port_hints: [8096, 8920]
category: media
description: Proprietary media server for organizing and streaming video, music, and photos
docs_url: https://hub.docker.com/r/emby/embyserver

common_issues:
  - id: permission-denied-config
    name: Permission denied on /config mount
    symptoms:
      - "permission denied"
      - "EACCES"
      - "Cannot create directory in /config"
      - "Failed to write database"
    trigger_conditions:
      - log_pattern: "permission denied.*config"
    steps:
      - id: step-1
        description: Check current ownership of the host config path
        type: check
        command: "stat {config_path}"
        expected_output: "Uid:"
        on_fail: step-2
      - id: step-2
        description: Display current ownership and permissions
        type: inform
        command: ""
      - id: step-3
        description: Recursively chown the config path to PUID:PGID
        type: fix
        command: "chown -R {puid}:{pgid} {config_path}"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Verify ownership was changed successfully
        type: check
        command: "stat {config_path} | grep Uid"
        expected_output: "Uid: {puid}"
    resolution: |
      The /config directory ownership was mismatched with the container's running UID/GID. The fix changed ownership to match. Emby should now be able to write configuration and database files.

  - id: library-not-scanning
    name: Library not scanning or files not appearing
    symptoms:
      - "No media files found"
      - "Library stuck at 0 items"
      - "Scan completes but finds nothing"
    trigger_conditions:
      - log_pattern: "scan.*0 items"
    steps:
      - id: step-1
        description: Verify media directories are mounted into container
        type: check
        command: "docker inspect {container_name} --format='{{range .Mounts}}{{.Source}}:{{.Destination}} {{end}}'"
        expected_output: "/movies"
        on_fail: step-2
      - id: step-2
        description: Check files are present in mounted directory
        type: check
        command: "ls -la {media_path} | head -10"
        expected_output: ""
      - id: step-3
        description: Trigger manual library refresh via API
        type: fix
        command: "docker exec {container_name} curl -X POST 'http://localhost:8096/Library/Refresh'"
        requires_approval: true
    resolution: |
      Emby library refresh was triggered. The server will index files in mounted directories. Initial scans may take several minutes. If files still don't appear, verify the mount contains supported media formats and Emby has read permissions.

  - id: high-cpu-transcoding
    name: High CPU during transcoding
    symptoms:
      - "CPU usage above 80% during playback"
      - "Playback stuttering or buffering"
      - "Fans running at maximum"
    trigger_conditions:
      - log_pattern: "transcod"
    steps:
      - id: step-1
        description: Check current CPU usage of Emby container
        type: check
        command: "docker stats {container_name} --no-stream | grep {container_name}"
        expected_output: ""
      - id: step-2
        description: Check if hardware acceleration device is available
        type: check
        command: "docker exec {container_name} vainfo 2>&1 | head -5"
        expected_output: ""
        on_fail: step-3
      - id: step-3
        description: Display recommendation for hardware acceleration setup
        type: inform
        command: ""
    resolution: |
      High CPU during transcoding usually means software-only encoding. Enable hardware acceleration in Emby Settings → Playback → Transcoding to offload work to GPU (Intel Quick Sync via /dev/dri, NVIDIA NVENC, or AMD VCE). Also consider lowering bitrate caps or enabling direct play.

  - id: premiere-license-not-active
    name: Emby Premiere features unavailable
    symptoms:
      - "Premiere feature requires active subscription"
      - "Hardware acceleration disabled despite GPU present"
      - "Mobile sync not working"
    trigger_conditions:
      - log_pattern: "premiere"
    steps:
      - id: step-1
        description: Check Premiere license status in logs
        type: check
        command: "docker logs {container_name} 2>&1 | grep -i 'premiere\\|license' | tail -5"
        expected_output: ""
      - id: step-2
        description: Inform user about Premiere licensing requirements
        type: inform
        command: ""
    resolution: |
      Several Emby features (hardware transcoding, mobile sync, cloud sync, cinema mode) require an Emby Premiere subscription. Sign in to Emby Connect at https://emby.media and apply the Premiere license to this server. The license attaches to the server, not the user, so it must be applied here.

default_config:
  compose_template: |
    services:
      emby:
        image: emby/embyserver:latest
        container_name: emby
        restart: unless-stopped
        environment:
          UID: ${PUID:-1000}
          GID: ${PGID:-1000}
          TZ: ${TZ:-UTC}
        volumes:
          - ${CONFIG_PATH:-./config}:/config
          - ${MOVIES_PATH:-./movies}:/movies:ro
          - ${TV_PATH:-./tv}:/tv:ro
          - ${MUSIC_PATH:-./music}:/music:ro
        ports:
          - "8096:8096/tcp"
          - "8920:8920/tcp"
        devices:
          - /dev/dri:/dev/dri
  required_vars:
    - name: PUID
      description: User ID to run Emby as
      default: "1000"
    - name: PGID
      description: Group ID for Emby
      default: "1000"
    - name: TZ
      description: Timezone
      default: "UTC"
    - name: CONFIG_PATH
      description: Host path for /config (configuration and database)
      default: "./config"
    - name: MOVIES_PATH
      description: Host path for /movies (movies library, read-only)
      default: "./movies"
    - name: TV_PATH
      description: Host path for /tv (TV series library, read-only)
      default: "./tv"
    - name: MUSIC_PATH
      description: Host path for /music (music library, read-only)
      default: "./music"
  known_mounts:
    - container_path: /config
      purpose: Emby configuration, database, and metadata
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"
    - container_path: /movies
      purpose: Movies library (read-only)
      recommended_permissions: "755"
      owner: "root:root"
    - container_path: /tv
      purpose: TV series library (read-only)
      recommended_permissions: "755"
      owner: "root:root"
    - container_path: /music
      purpose: Music library (read-only)
      recommended_permissions: "755"
      owner: "root:root"

linuxserver_conventions:
  enabled: false
  puid_env: UID
  pgid_env: GID
  config_mount: /config

notes: |
  Two image variants are widely used: the official emby/embyserver (uses UID/GID
  env vars, not PUID/PGID) and linuxserver/emby (uses PUID/PGID per LinuxServer
  conventions). The compose template above targets the official image; swap
  UID/GID for PUID/PGID and set linuxserver_conventions.enabled: true when
  using the LinuxServer variant.

  Premiere license: hardware transcoding, mobile sync, and cinema mode require
  an Emby Premiere subscription. License is server-scoped, not user-scoped.

  Ports: 8096 is HTTP, 8920 is HTTPS. Both should be exposed for full feature
  parity (cast/discovery uses HTTPS on some clients).
