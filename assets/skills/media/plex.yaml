id: plex
name: Plex Media Server
version: "1.0"
container_match:
  image_patterns:
    - "plexinc/pms-docker"
    - "linuxserver/plex"
  port_hints: [32400]
category: media
description: Media server for managing and streaming video, music, and photos
docs_url: https://hub.docker.com/r/plexinc/pms-docker

common_issues:
  - id: permission-denied-config
    name: Permission denied on /config mount
    symptoms:
      - "permission denied"
      - "EACCES"
      - "Cannot create directory in /config"
      - "Failed to write preferences.xml"
    trigger_conditions:
      - log_pattern: "permission denied.*config"
    steps:
      - id: step-1
        description: Check current ownership of the host config path
        type: check
        command: "stat {config_path}"
        expected_output: "Uid: {puid}"
        on_fail: step-2
      - id: step-2
        description: Display current ownership and permissions
        type: inform
        command: ""
      - id: step-3
        description: Recursively chown the config path to PUID:PGID
        type: fix
        command: "chown -R {puid}:{pgid} {config_path}"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Verify ownership was changed successfully
        type: check
        command: "stat {config_path}"
        expected_output: "Uid: {puid}"
    resolution: |
      The /config directory ownership was mismatched with the container's running UID/GID. This prevents Plex from writing configuration files. The fix changed ownership to match the container process. Plex should now be able to write to /config.

  - id: remote-access-not-working
    name: Remote access not configured or unavailable
    symptoms:
      - "Remote Access is unavailable"
      - "Couldn't get remote access status"
      - "Unable to access from outside network"
      - "Yellow or orange indicator in Settings → Remote Access"
    trigger_conditions:
      - log_pattern: "remote access"
      - log_pattern: "Couldn't get remote access"
    steps:
      - id: step-1
        description: Check if Plex is listening on port 32400
        type: check
        command: "ss -tlnp | grep 32400"
        expected_output: "LISTEN.*32400"
        on_fail: step-2
      - id: step-2
        description: Verify port 32400 is published in docker inspect
        type: check
        command: "docker inspect {container_name} | grep -A 5 '32400'"
        expected_output: "32400"
        on_fail: step-3
      - id: step-3
        description: Display port mapping status
        type: inform
        command: ""
      - id: step-4
        description: Restart Plex to force remote access re-initialization
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Wait 30 seconds for Plex to stabilize and check logs
        type: check
        command: "sleep 30 && docker logs {container_name} | tail -20"
    resolution: |
      Remote Access requires port 32400 to be properly exposed and publicly reachable. The container has been restarted to force Plex to reinitialize remote access detection. If the issue persists, check your router's port forwarding settings or firewall rules.

  - id: no-media-library-scan
    name: Library not scanning or recognizing media files
    symptoms:
      - "No media files found"
      - "Library stuck at 0 items"
      - "Scan library completes but finds nothing"
      - "Files in mounted directory not appearing in library"
    trigger_conditions:
      - log_pattern: "no metadata"
      - log_pattern: "scan.*0 items"
    steps:
      - id: step-1
        description: Verify media directories are mounted into container
        type: check
        command: "docker inspect {container_name} --format='{{range .Mounts}}{{.Source}}:{{.Destination}} {{end}}'"
        expected_output: "/tv:/tv"
        on_fail: step-2
      - id: step-2
        description: Check if files are actually present in the mounted directory
        type: check
        command: "ls -la {media_path} | head -20"
        expected_output: ""
        on_fail: step-3
      - id: step-3
        description: Display contents of mounted media directory
        type: inform
        command: ""
      - id: step-4
        description: Check Plex logs for media scanning errors
        type: check
        command: "docker logs {container_name} | grep -i 'error\\|failed' | tail -10"
        expected_output: ""
      - id: step-5
        description: Trigger a manual library refresh
        type: fix
        command: "docker exec {container_name} curl -X GET 'http://localhost:32400/library/sections/all/refresh'"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Check library scan status after refresh
        type: check
        command: "docker logs {container_name} | grep -i 'scan' | tail -5"
    resolution: |
      Plex library scan was triggered manually. The server will now index media files in the mounted directories. Initial scans may take several minutes depending on library size. If files still don't appear, verify the mounted path contains supported media files and that Plex has read permissions.

  - id: transcode-directory-permission
    name: Transcode directory permission denied
    symptoms:
      - "permission denied.*transcode"
      - "Cannot write to /transcode"
      - "Transcoding failed"
      - "Insufficient disk space or permission error"
    trigger_conditions:
      - log_pattern: "permission denied.*transcode"
    steps:
      - id: step-1
        description: Check if transcode directory exists and is mounted
        type: check
        command: "test -d {transcode_path} && echo 'exists' || echo 'missing'"
        expected_output: "exists"
        on_fail: step-2
      - id: step-2
        description: Create transcode directory if missing
        type: fix
        command: "mkdir -p {transcode_path}"
        requires_approval: true
        on_success: step-3
      - id: step-3
        description: Check ownership of transcode directory
        type: check
        command: "stat {transcode_path} | grep Uid"
        expected_output: "Uid: {puid}"
        on_fail: step-4
      - id: step-4
        description: Fix transcode directory ownership
        type: fix
        command: "chown -R {puid}:{pgid} {transcode_path} && chmod 755 {transcode_path}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify permissions are now correct
        type: check
        command: "stat {transcode_path}"
    resolution: |
      The transcode directory has been created and ownership has been corrected to match the Plex container's UID/GID. Transcode operations should now succeed. If transcoding still fails, verify there is sufficient free disk space in the transcode directory.

default_config:
  compose_template: |
    services:
      plex:
        image: lscr.io/linuxserver/plex:latest
        container_name: plex
        restart: unless-stopped
        network_mode: host
        environment:
          PUID: ${PUID:-1000}
          PGID: ${PGID:-1000}
          TZ: ${TZ:-UTC}
          PLEX_CLAIM: ${PLEX_CLAIM}
        volumes:
          - ${CONFIG_PATH:-./config}:/config
          - ${TRANSCODE_PATH:-./transcode}:/transcode
          - ${TV_PATH:-./tv}:/tv
          - ${MOVIES_PATH:-./movies}:/movies
        ports:
          - "32400:32400/tcp"
  required_vars:
    - name: PUID
      description: User ID to run Plex as
      default: "1000"
    - name: PGID
      description: Group ID for Plex
      default: "1000"
    - name: TZ
      description: Timezone
      default: "UTC"
    - name: CONFIG_PATH
      description: Host path for /config (configuration and database)
      default: "./config"
    - name: TRANSCODE_PATH
      description: Host path for /transcode (temporary transcode files)
      default: "./transcode"
    - name: TV_PATH
      description: Host path for /tv (TV series library)
      default: "./tv"
    - name: MOVIES_PATH
      description: Host path for /movies (movies library)
      default: "./movies"
    - name: PLEX_CLAIM
      description: Plex claim token for initial setup (from plex.tv/claim)
      default: ""
  known_mounts:
    - container_path: /config
      purpose: Plex configuration, database, and preferences
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"
    - container_path: /transcode
      purpose: Temporary transcode files during media playback
      recommended_permissions: "755"
      owner: "{PUID}:{PGID}"
    - container_path: /tv
      purpose: TV series library (read-only from Plex perspective)
      recommended_permissions: "755"
      owner: "root:root"
    - container_path: /movies
      purpose: Movies library (read-only from Plex perspective)
      recommended_permissions: "755"
      owner: "root:root"

linuxserver_conventions:
  enabled: true
  puid_env: PUID
  pgid_env: PGID
  config_mount: /config

notes: |
  Plex Media Server is a proprietary media server. The plexinc/pms-docker image is the official image; linuxserver/plex is an unofficial wrapper.

  Network mode: The example uses host networking (network_mode: host) because Plex relies on UPnP and requires access to specific ports. This may need adjustment for your setup.

  PLEX_CLAIM token: Required for initial setup. Generate one at https://www.plex.tv/claim (valid for 4 minutes).

  Transcode directory: Should be on fast local storage (SSD preferred) to avoid stuttering during playback.

  Common gotchas:
  - Library not scanning: Verify media directories are mounted and contain files in standard formats.
  - Remote access unavailable: Check port 32400 is open and reachable from WAN.
  - Slow playback: Transcode directory permissions or disk speed issues; check Plex logs.
