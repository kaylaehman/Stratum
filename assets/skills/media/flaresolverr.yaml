id: flaresolverr
name: FlareSolverr
version: "1.0"
container_match:
  image_patterns:
    - "ghcr.io/flaresolverr/flaresolverr"
    - "flaresolverr/flaresolverr"
  port_hints: [8191]
category: media
description: Proxy server that solves Cloudflare and DDoS-Guard challenges for indexer requests
docs_url: https://github.com/FlareSolverr/FlareSolverr

common_issues:
  - id: out-of-memory
    name: Container restarting under memory pressure
    symptoms:
      - "OOMKilled"
      - "Out of memory"
      - "Cannot allocate memory"
    trigger_conditions:
      - log_pattern: "OOMKilled"
    steps:
      - id: step-1
        description: Check container memory usage and limit
        type: check
        command: "docker stats {container_name} --no-stream"
        expected_output: ""
      - id: step-2
        description: Inform about the headless-Chromium memory profile
        type: inform
        command: ""
    resolution: |
      FlareSolverr spawns a headless Chromium per challenge — peak memory can
      hit 500MB+ on busy indexers. Raise the container memory limit or remove
      the limit entirely if the host has the capacity. Restarting on OOM is a
      symptom of an undersized limit, not a bug.

  - id: challenge-solve-timeout
    name: Cloudflare challenge times out
    symptoms:
      - "Challenge solve failed"
      - "Timeout waiting for challenge"
      - "FlareSolverr returned error"
    trigger_conditions:
      - log_pattern: "timeout"
    steps:
      - id: step-1
        description: Surface the recent challenge errors
        type: check
        command: "docker logs {container_name} 2>&1 | grep -i 'challenge\\|timeout' | tail -5"
        expected_output: ""
      - id: step-2
        description: Inform about timeout tuning
        type: inform
        command: ""
    resolution: |
      Raise the timeout via the BROWSER_TIMEOUT env var (default 40000 ms) if
      challenges are slow on your network. If specific trackers are always
      timing out, the tracker may have changed its anti-bot config and require
      a FlareSolverr upgrade.

default_config:
  compose_template: |
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        container_name: flaresolverr
        restart: unless-stopped
        environment:
          LOG_LEVEL: info
          LOG_HTML: "false"
          CAPTCHA_SOLVER: none
          TZ: ${TZ:-UTC}
        ports:
          - "8191:8191/tcp"
  required_vars:
    - name: TZ
      description: Timezone
      default: "UTC"
  known_mounts: []

linuxserver_conventions:
  enabled: false

notes: |
  No persistent state — FlareSolverr does not require any volumes.

  Point Prowlarr or Jackett at http://flaresolverr:8191 (container name on
  shared Docker network) under their indexer FlareSolverr URL setting.
