id: vaultwarden
name: Vaultwarden Password Manager
version: "1.0"
container_match:
  image_patterns:
    - "vaultwarden/server"
  port_hints: [80, 3012]
category: security
description: Self-hosted Bitwarden-compatible password manager and vault
docs_url: https://github.com/dani-garcia/vaultwarden

common_issues:
  - id: signups-disabled-locked-out
    name: Signups disabled after initial setup, new users cannot register
    symptoms:
      - "Signup button missing or disabled"
      - "Cannot create new account"
      - "Error: Organization creation disabled"
      - "User registration not allowed"
    trigger_conditions:
      - log_pattern: "signups.*disabled"
      - log_pattern: "registration.*not allowed"
    steps:
      - id: step-1
        description: Check current SIGNUPS_ALLOWED setting
        type: check
        command: "docker inspect {container_name} | grep -i SIGNUPS_ALLOWED"
        expected_output: "SIGNUPS_ALLOWED"
        on_fail: step-2
      - id: step-2
        description: Display environment variables related to signups
        type: inform
        command: ""
      - id: step-3
        description: Update SIGNUPS_ALLOWED to true to re-enable user registration
        type: fix
        command: "docker exec {container_name} sed -i 's/SIGNUPS_ALLOWED=.*/SIGNUPS_ALLOWED=true/' /etc/vaultwarden/.env"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Restart Vaultwarden to apply environment change
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify signups are now enabled in web interface
        type: check
        command: "curl -s http://localhost:80 | grep -i signup"
    resolution: |
      SIGNUPS_ALLOWED controls whether new users can self-register accounts. After initial setup, administrators often disable signups to prevent unauthorized account creation. To re-enable, set SIGNUPS_ALLOWED=true in the environment. This setting takes effect after container restart.

  - id: websocket-disabled-no-push
    name: WebSocket disabled, real-time synchronization not working
    symptoms:
      - "Changes not syncing between devices in real-time"
      - "Must refresh browser to see updated data"
      - "Log entries show WebSocket connection failures"
      - "Slow sync when editing vault items"
    trigger_conditions:
      - log_pattern: "websocket.*disabled"
      - log_pattern: "WEBSOCKET_ENABLED=false"
    steps:
      - id: step-1
        description: Check WEBSOCKET_ENABLED setting
        type: check
        command: "docker inspect {container_name} | grep -i WEBSOCKET_ENABLED"
        expected_output: "WEBSOCKET_ENABLED"
        on_fail: step-2
      - id: step-2
        description: Display current WebSocket configuration
        type: inform
        command: ""
      - id: step-3
        description: Inform about WebSocket impact on multi-device sync
        type: inform
        command: ""
      - id: step-4
        description: Enable WEBSOCKET_ENABLED in environment
        type: fix
        command: "docker exec {container_name} sed -i 's/WEBSOCKET_ENABLED=.*/WEBSOCKET_ENABLED=true/' /etc/vaultwarden/.env"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Configure reverse proxy to support WebSocket (port 3012)
        type: inform
        command: ""
      - id: step-6
        description: Restart Vaultwarden with WebSocket enabled
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-7
      - id: step-7
        description: Verify WebSocket is listening on port 3012
        type: check
        command: "docker exec {container_name} ss -tlnp | grep 3012"
        expected_output: "LISTEN.*3012"
    resolution: |
      WebSocket (port 3012) provides real-time push notifications when vault data changes. With WebSocket disabled, all devices must poll periodically, creating noticeable latency. Ensure your reverse proxy (Nginx, Caddy, Traefik) forwards both HTTP (port 80) and WebSocket (port 3012) traffic to Vaultwarden. Enable WEBSOCKET_ENABLED=true and restart the container.

  - id: admin-token-not-set
    name: Admin dashboard inaccessible, ADMIN_TOKEN not configured
    symptoms:
      - "Admin panel login fails"
      - "Cannot access /admin path"
      - "No way to invite users or manage organizations"
      - "Error: Admin token invalid or missing"
    trigger_conditions:
      - log_pattern: "admin.*token.*invalid"
      - log_pattern: "admin.*not.*enabled"
    steps:
      - id: step-1
        description: Check if ADMIN_TOKEN is set in environment
        type: check
        command: "docker inspect {container_name} | grep -i ADMIN_TOKEN"
        expected_output: "ADMIN_TOKEN"
        on_fail: step-2
      - id: step-2
        description: Display environment variables
        type: inform
        command: ""
      - id: step-3
        description: Generate a secure random ADMIN_TOKEN
        type: fix
        command: "echo 'ADMIN_TOKEN='$(openssl rand -hex 32) | docker exec -i {container_name} tee -a /etc/vaultwarden/.env"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Restart Vaultwarden with new ADMIN_TOKEN
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify admin panel is now accessible
        type: check
        command: "curl -s http://localhost:80/admin | head -5"
    resolution: |
      ADMIN_TOKEN is a randomly generated secret that protects the Vaultwarden admin dashboard. Without it set, the admin interface is inaccessible. A new ADMIN_TOKEN has been generated and configured. Access the admin panel at /admin using the new token. Store it securely in your secrets manager or password vault.

  - id: https-not-enforced
    name: HTTPS not enforced, client connections not encrypted
    symptoms:
      - "Bitwarden app warning about insecure connection"
      - "Data transmitted in plaintext over network"
      - "Browser shows lock icon but warns about certificate"
      - "DOMAIN env variable not set or incorrect"
    trigger_conditions:
      - log_pattern: "DOMAIN.*not set"
      - log_pattern: "https.*disabled"
    steps:
      - id: step-1
        description: Inform about security risk of HTTP-only
        type: inform
        command: ""
      - id: step-2
        description: Check current DOMAIN setting
        type: check
        command: "docker inspect {container_name} | grep -i DOMAIN"
        expected_output: "DOMAIN"
        on_fail: step-3
      - id: step-3
        description: Display environment configuration
        type: inform
        command: ""
      - id: step-4
        description: Set DOMAIN to your HTTPS endpoint (e.g., vault.example.com)
        type: fix
        command: "docker exec {container_name} sed -i 's|DOMAIN=.*|DOMAIN=https://{domain}|' /etc/vaultwarden/.env"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify reverse proxy has valid SSL certificate
        type: check
        command: "curl -I https://{domain} 2>&1 | head -3"
        expected_output: "200"
      - id: step-6
        description: Restart Vaultwarden with HTTPS domain configured
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-7
      - id: step-7
        description: Verify HTTPS endpoint is reachable
        type: check
        command: "curl -s https://{domain} | grep -i '<title>.*vault' | head -1"
    resolution: |
      Vaultwarden must be accessed over HTTPS to encrypt password data in transit. Set DOMAIN to your HTTPS endpoint and ensure your reverse proxy (Nginx, Caddy, Traefik) has a valid SSL certificate. Clients will refuse to connect over HTTP for security reasons.

default_config:
  compose_template: |
    services:
      vaultwarden:
        image: vaultwarden/server:latest
        container_name: vaultwarden
        restart: unless-stopped
        environment:
          DOMAIN: ${DOMAIN:-https://vault.example.com}
          SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED:-false}
          INVITATIONS_ORG_INVITE_EXPIRATION_HOURS: ${INVITATIONS_ORG_INVITE_EXPIRATION_HOURS:-168}
          ADMIN_TOKEN: ${ADMIN_TOKEN}
          WEBSOCKET_ENABLED: ${WEBSOCKET_ENABLED:-true}
          LOG_LEVEL: ${LOG_LEVEL:-info}
          EXTENDED_LOGGING: ${EXTENDED_LOGGING:-true}
          LOG_FILE: ${LOG_FILE:-/data/vaultwarden.log}
        volumes:
          - ${DATA_PATH:-./data}:/data
        ports:
          - "80:80"
          - "3012:3012"
        cap_drop:
          - ALL
        cap_add:
          - CHOWN
          - DAC_OVERRIDE
          - SETFCAP
  required_vars:
    - name: DOMAIN
      description: HTTPS domain URL for external access (e.g., https://vault.example.com)
      default: "https://vault.example.com"
    - name: ADMIN_TOKEN
      description: Secure random token for /admin panel access (generate with `openssl rand -hex 32`)
      default: ""
    - name: SIGNUPS_ALLOWED
      description: Allow self-registration of new accounts (true/false)
      default: "false"
    - name: WEBSOCKET_ENABLED
      description: Enable WebSocket for real-time sync (requires port 3012 exposed)
      default: "true"
    - name: DATA_PATH
      description: Host path for /data (vaults, config, logs)
      default: "./data"
  known_mounts:
    - container_path: /data
      purpose: Vault data, user accounts, and configuration database
      recommended_permissions: "700"
      owner: "{PUID}:{PGID}"

notes: |
  Vaultwarden is a self-hosted password manager compatible with the Bitwarden client ecosystem. All communication should be over HTTPS for security.

  Key configuration:
  - ADMIN_TOKEN: Required to access the /admin panel for user management and organization creation. Generate a secure random value.
  - SIGNUPS_ALLOWED: Controls self-registration. Set to false after initial admin account creation to prevent unauthorized signups.
  - WEBSOCKET_ENABLED: Enables port 3012 for real-time synchronization between devices.
  - DOMAIN: Must be the external HTTPS URL. Clients use this to connect.

  Reverse proxy requirement: Use Nginx, Caddy, or Traefik to terminate TLS and forward both HTTP (port 80) and WebSocket (port 3012) to Vaultwarden.

  Database: By default uses SQLite in /data. For multi-user deployments, consider PostgreSQL (set DATABASE_URL environment variable).

  Backup: The /data volume contains all vault data. Regular backups are critical.
