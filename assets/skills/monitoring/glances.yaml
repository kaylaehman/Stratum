id: glances
name: Glances
version: "1.0"
container_match:
  image_patterns:
    - "nicolargo/glances"
  port_hints: [61208]
category: monitoring
description: Cross-platform system monitoring with web UI and REST API
docs_url: https://glances.readthedocs.io/

common_issues:
  - id: docker-socket-missing
    name: Glances reports no Docker container stats
    symptoms:
      - "Docker not available"
      - "Docker plugin disabled"
    trigger_conditions:
      - log_pattern: "docker.*not.*available"
    steps:
      - id: step-1
        description: Verify the docker socket is mounted
        type: check
        command: "docker inspect {container_name} --format='{{range .Mounts}}{{.Source}}:{{.Destination}} {{end}}' | grep docker.sock"
        expected_output: "/var/run/docker.sock"
        on_fail: step-2
      - id: step-2
        description: Inform about socket mount requirement
        type: inform
        command: ""
    resolution: |
      Mount /var/run/docker.sock:/var/run/docker.sock (read-only is fine for
      stats). Without it Glances has no view of containers — it can still
      monitor the host process tree.

  - id: web-mode-not-enabled
    name: Web UI on port 61208 returns connection refused
    symptoms:
      - "Connection refused on 61208"
      - "ERR_CONNECTION_REFUSED"
    trigger_conditions:
      - log_pattern: "connection refused"
    steps:
      - id: step-1
        description: Check current GLANCES_OPT
        type: check
        command: "docker inspect {container_name} --format='{{range .Config.Env}}{{println .}}{{end}}' | grep GLANCES_OPT"
        expected_output: "-w"
        on_fail: step-2
      - id: step-2
        description: Inform about web-server mode
        type: inform
        command: ""
    resolution: |
      The default glances image does not start the web server. Set
      `GLANCES_OPT=-w` in the env to enable it. Without this flag Glances
      runs in CLI mode only — useful inside `docker exec` but not for the
      web UI.

default_config:
  compose_template: |
    services:
      glances:
        image: nicolargo/glances:latest-full
        container_name: glances
        restart: unless-stopped
        pid: host
        environment:
          GLANCES_OPT: "-w"
          TZ: ${TZ:-UTC}
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
        ports:
          - "61208:61208/tcp"
  required_vars:
    - name: TZ
      description: Timezone
      default: "UTC"
  known_mounts:
    - container_path: /var/run/docker.sock
      purpose: Docker daemon socket for container stats
      recommended_permissions: "660"
      owner: "root:docker"

linuxserver_conventions:
  enabled: false

notes: |
  Use the `-full` tag for the version that includes optional sensors
  (sensors, IPMI, Wi-Fi). The base `latest` tag is smaller but lacks
  these collectors.

  `pid: host` gives Glances the host process tree. Without it you'll only
  see processes inside the container.
