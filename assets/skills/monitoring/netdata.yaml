default_config:
  compose_template: |
    services:
      netdata:
        image: netdata/netdata:latest
        container_name: netdata
        restart: unless-stopped
        hostname: {hostname}
        cap_add:
          - SYS_ADMIN
          - SYS_PTRACE
        security_opt:
          - apparmor=unconfined
        volumes:
          - netdata_config:/etc/netdata
          - netdata_lib:/var/lib/netdata
          - /etc/passwd:/host/etc/passwd:ro
          - /etc/group:/host/etc/group:ro
          - /proc:/host/proc:ro
          - /sys:/host/sys:ro
          - /etc/os-release:/host/etc/os-release:ro
          - /etc/localtime:/etc/localtime:ro
          - /var/run/docker.sock:/var/run/docker.sock:ro
        environment:
          NETDATA_CLAIM_TOKEN: ${NETDATA_CLAIM_TOKEN}
          NETDATA_CLAIM_URL: ${NETDATA_CLAIM_URL}
          NETDATA_CLAIM_ROOMS: ${NETDATA_CLAIM_ROOMS}
        ports:
          - "19999:19999/tcp"

    volumes:
      netdata_config:
      netdata_lib:
  required_vars:
    - name: NETDATA_CLAIM_TOKEN
      description: Optional token for Netdata Cloud integration
      default: ""
    - name: NETDATA_CLAIM_URL
      description: Optional Netdata Cloud URL
      default: ""
    - name: NETDATA_CLAIM_ROOMS
      description: Optional Netdata Cloud room IDs
      default: ""
  known_mounts:
    - container_path: /etc/netdata
      purpose: Configuration and alert rules
      recommended_permissions: "755"
      owner: "root:root"
    - container_path: /var/lib/netdata
      purpose: Metrics database and cache
      recommended_permissions: "755"
      owner: "netdata:netdata"
    - container_path: /proc
      purpose: Host process information for system metrics
      recommended_permissions: "ro"
      owner: "root:root"
    - container_path: /sys
      purpose: Host sysfs for advanced metrics
      recommended_permissions: "ro"
      owner: "root:root"

linuxserver_conventions:
  enabled: false

notes: |
  Netdata is a real-time performance monitoring agent. It requires elevated privileges (SYS_ADMIN, SYS_PTRACE) and access to /proc and /sys to collect comprehensive system metrics.

  Mount requirements:
  - /proc and /sys: Read-only access for process and system metrics
  - /etc/passwd and /etc/group: To resolve UIDs/GIDs to usernames in process metrics
  - /var/run/docker.sock: To monitor other containers on this host
  - /etc/os-release: For system identification

  Netdata Cloud integration is optional. Leave NETDATA_CLAIM_* variables empty to run in standalone mode.

  Database location: /var/lib/netdata stores time-series data in-memory. Large retention windows (default 3600s) increase memory usage. Adjust the history parameter in netdata.conf to balance memory vs retention.

  Common gotchas:
  - Metrics incomplete: Missing required mount points or capabilities
  - High memory: Reduce history retention in config
  - Dashboard unreachable: Port not exposed or firewall blocking
