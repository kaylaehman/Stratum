id: redis
name: Redis In-Memory Data Store
version: "1.0"
container_match:
  image_patterns:
    - "redis"
    - "redis:latest"
    - "redis:alpine"
  port_hints: [6379]
category: database
description: High-performance in-memory data store for caching, sessions, queues, and real-time workloads
docs_url: https://hub.docker.com/_/redis

common_issues:
  - id: connection-refused
    name: Connection refused on port 6379
    symptoms:
      - "Connection refused"
      - "Cannot connect to Redis server"
      - "redis-cli: Could not connect"
      - "ECONNREFUSED 6379"
    trigger_conditions:
      - log_pattern: "bind.*error"
      - log_pattern: "address.*in use"
    steps:
      - id: step-1
        description: Check if Redis process is listening on port 6379
        type: check
        command: "docker exec {container_name} redis-cli ping"
        expected_output: "PONG"
        on_fail: step-2
      - id: step-2
        description: Verify port 6379 is exposed in container
        type: check
        command: "docker inspect {container_name} | grep -A 3 '6379'"
        expected_output: "6379"
        on_fail: step-3
      - id: step-3
        description: Display Redis service status
        type: inform
        command: ""
      - id: step-4
        description: Restart Redis container to restore connectivity
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify connectivity after restart
        type: check
        command: "docker exec {container_name} redis-cli ping"
        expected_output: "PONG"
    resolution: |
      Redis was not listening on port 6379 or the container was not properly configured. The container has been restarted to restore normal operation. If the issue persists, verify that port 6379 is correctly mapped in your Docker Compose configuration and that no other service is occupying the port on the host.

  - id: memory-limit-exceeded
    name: Redis memory limit exceeded or slow performance
    symptoms:
      - "OOM command not allowed when used memory > maxmemory"
      - "Eviction failure"
      - "Out of memory"
      - "Sudden performance degradation"
      - "Redis keys being randomly deleted"
    trigger_conditions:
      - log_pattern: "maxmemory.*reached"
      - log_pattern: "oom"
    steps:
      - id: step-1
        description: Check current memory usage and maxmemory setting
        type: check
        command: "docker exec {container_name} redis-cli info memory | grep -E 'used_memory|maxmemory'"
        expected_output: ""
      - id: step-2
        description: Display memory statistics
        type: inform
        command: ""
      - id: step-3
        description: Check current eviction policy
        type: check
        command: "docker exec {container_name} redis-cli CONFIG GET maxmemory-policy"
        expected_output: ""
      - id: step-4
        description: Explain memory management options
        type: inform
        command: ""
      - id: step-5
        description: Apply recommended memory limit and eviction policy
        type: fix
        command: "docker exec {container_name} redis-cli CONFIG SET maxmemory {memory_limit} && docker exec {container_name} redis-cli CONFIG SET maxmemory-policy allkeys-lru"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Persist configuration changes
        type: fix
        command: "docker exec {container_name} redis-cli BGSAVE"
        requires_approval: true
    resolution: |
      Redis memory limit has been adjusted and eviction policy set to allkeys-lru (Least Recently Used). This allows Redis to automatically remove least-recently-used keys when memory is exceeded, preventing out-of-memory errors. Consider reviewing your application's caching strategy and data retention needs. Monitor memory usage over time to determine if a larger limit is required.

  - id: aof-corruption
    name: AOF (Append-Only File) corruption or rewrite failure
    symptoms:
      - "Bad file format reading the append only file"
      - "Failed to rewrite AOF"
      - "Unfinished MULTI/EXEC in AOF"
      - "Redis refusing to start with AOF enabled"
      - "Disk full during AOF rewrite"
    trigger_conditions:
      - log_pattern: "aof.*corrupt"
      - log_pattern: "bad file format"
      - log_pattern: "appendonly"
    steps:
      - id: step-1
        description: Check if AOF is enabled and its status
        type: check
        command: "docker exec {container_name} redis-cli CONFIG GET appendonly"
        expected_output: ""
      - id: step-2
        description: Verify AOF file size on disk
        type: check
        command: "docker exec {container_name} ls -lh /data/appendonly.aof 2>/dev/null || echo 'No AOF file found'"
        expected_output: ""
      - id: step-3
        description: Display current AOF status and statistics
        type: inform
        command: ""
      - id: step-4
        description: Attempt to repair corrupt AOF file
        type: fix
        command: "docker exec {container_name} redis-check-aof --fix /data/appendonly.aof"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Restart Redis with repaired AOF file
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Verify Redis started successfully with AOF
        type: check
        command: "sleep 5 && docker exec {container_name} redis-cli ping"
        expected_output: "PONG"
    resolution: |
      The AOF (Append-Only File) has been repaired and Redis restarted. The AOF provides durability by logging all write commands. If corruption occurs frequently, consider switching to RDB (snapshot) persistence, which is more robust to disk corruption. Ensure adequate disk space is available for AOF rewrites, as they require temporary disk space equal to the current AOF size.

  - id: auth-failure
    name: Authentication failure or requirepass not working
    symptoms:
      - "WRONGPASS invalid username-password pair"
      - "Client authentication required"
      - "Cannot authenticate to Redis"
      - "ERR invalid password"
    trigger_conditions:
      - log_pattern: "WRONGPASS"
      - log_pattern: "AUTH.*failed"
      - log_pattern: "invalid.*password"
    steps:
      - id: step-1
        description: Check if authentication is enabled
        type: check
        command: "docker exec {container_name} redis-cli CONFIG GET requirepass"
        expected_output: ""
      - id: step-2
        description: Display current auth configuration
        type: inform
        command: ""
      - id: step-3
        description: Attempt to authenticate with provided password
        type: check
        command: "docker exec {container_name} redis-cli -a '{redis_password}' ping"
        expected_output: "PONG"
        on_fail: step-4
      - id: step-4
        description: Reset requirepass configuration
        type: fix
        command: "docker exec {container_name} redis-cli CONFIG SET requirepass '{redis_password}'"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify authentication works after reconfiguration
        type: check
        command: "docker exec {container_name} redis-cli -a '{redis_password}' ping"
        expected_output: "PONG"
    resolution: |
      Redis authentication has been reconfigured with the provided password. All clients connecting to Redis now require the password to authenticate. Update your application's Redis connection strings to include the password in the URL (redis://:password@host:6379) or as a separate auth parameter.

default_config:
  compose_template: |
    services:
      redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        command: redis-server --appendonly yes --appendfsync everysec --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
        environment:
          TZ: ${TZ:-UTC}
        volumes:
          - ${DATA_PATH:-./data}:/data
        ports:
          - "${REDIS_PORT:-6379}:6379"
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 5s
          retries: 5
  required_vars:
    - name: REDIS_MAXMEMORY
      description: Maximum memory Redis can use (e.g., 256mb, 1gb)
      default: "256mb"
    - name: REDIS_PORT
      description: Port to expose Redis on host
      default: "6379"
    - name: DATA_PATH
      description: Host path for Redis persistence data
      default: "./data"
    - name: TZ
      description: Timezone for container
      default: "UTC"
  known_mounts:
    - container_path: /data
      purpose: Redis data persistence (RDB snapshots and AOF log)
      recommended_permissions: "755"
      owner: "999:999"

notes: |
  Redis is a high-performance in-memory data store with optional persistence. It supports multiple data structures (strings, lists, sets, sorted sets, hashes) and is commonly used for caching, session storage, message queues, and real-time analytics.

  Persistence modes:
  - RDB (snapshot): Periodic point-in-time snapshots; fast recovery, smaller files, risk of data loss between snapshots
  - AOF (append-only file): Logs every command; more durable, larger files, slower writes
  - Both: Combines RDB and AOF for durability and recovery speed

  The default compose template uses AOF with fsync on every second (appendfsync everysec) for a good balance between performance and durability.

  Memory management:
  - Set maxmemory to prevent unbounded growth
  - Configure maxmemory-policy to control eviction when memory is exceeded (allkeys-lru is common)
  - Monitor memory usage with `redis-cli info memory`

  Password protection:
  - Set requirepass to require authentication
  - Always use strong passwords in production
  - Connect with: redis-cli -a <password> or redis://:password@host:port

  Clustering and replication:
  - For high availability, use Redis Sentinel or Redis Cluster (beyond basic setup)
  - Replication can be configured with --slaveof (source/replica model)

  Performance tuning:
  - Use pipelining for bulk operations
  - Configure timeout settings appropriately
  - Monitor slow queries with SLOWLOG
