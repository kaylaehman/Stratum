id: timetagger
name: TimeTagger Time Tracking
version: "1.0"
container_match:
  image_patterns:
    - "ghcr.io/timetagger/timetagger"
  port_hints: [8000]
category: time
description: Web-based time tracking tool with flexible logging and reporting
docs_url: https://github.com/pyomeca/timetagger

common_issues:
  - id: connection-refused
    name: Cannot connect to TimeTagger web interface
    symptoms:
      - "Connection refused"
      - "Cannot reach localhost:8000"
      - "Port is not listening"
      - "ERR_CONNECTION_REFUSED"
    trigger_conditions:
      - log_pattern: "refused"
    steps:
      - id: step-1
        description: Check if TimeTagger container is running
        type: check
        command: "docker ps | grep timetagger"
        expected_output: "Up"
        on_fail: step-2
      - id: step-2
        description: Display container status
        type: inform
        command: ""
      - id: step-3
        description: Verify port 8000 is listening inside container
        type: check
        command: "docker exec {container_name} ss -tlnp | grep 8000"
        expected_output: "LISTEN"
        on_fail: step-4
      - id: step-4
        description: Check container logs for startup errors
        type: check
        command: "docker logs {container_name} | tail -20"
        expected_output: ""
      - id: step-5
        description: Restart TimeTagger container
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Verify connection after restart
        type: check
        command: "sleep 3 && docker exec {container_name} ss -tlnp | grep 8000"

  - id: permission-denied-data
    name: Permission denied on data directory
    symptoms:
      - "permission denied"
      - "Cannot read/write data files"
      - "EACCES"
      - "Failed to open database"
    trigger_conditions:
      - log_pattern: "Permission denied"
      - log_pattern: "EACCES"
    steps:
      - id: step-1
        description: Check current ownership of the host data path
        type: check
        command: "stat {config_path}"
        expected_output: "Uid:"
        on_fail: step-2
      - id: step-2
        description: Display current ownership and permissions
        type: inform
        command: ""
      - id: step-3
        description: Recursively chown the data directory
        type: fix
        command: "chown -R 1000:1000 {config_path}"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Verify ownership was changed
        type: check
        command: "stat {config_path} | grep Uid"

  - id: data-loss-persistence
    name: Data not persisting between restarts
    symptoms:
      - "Time entries disappear after container restart"
      - "Data only exists while container is running"
      - "No persistent storage configured"
    trigger_conditions:
      - log_pattern: "no data"
    steps:
      - id: step-1
        description: Check if /data volume is mounted
        type: check
        command: "docker inspect {container_name} | grep -A 5 '/data'"
        expected_output: "/data"
        on_fail: step-2
      - id: step-2
        description: Display current volume mounts
        type: inform
        command: ""
      - id: step-3
        description: Verify host data directory exists and is readable
        type: check
        command: "ls -la {config_path}"
        expected_output: ""
      - id: step-4
        description: Check if any data files exist
        type: check
        command: "find {config_path} -type f | head -10"
        expected_output: ""
      - id: step-5
        description: Inform user about volume configuration requirement
        type: inform
        command: ""
    resolution: |
      TimeTagger stores all time tracking data in /data directory. For data to persist across container restarts, this directory must be mounted as a volume on the host. Without a bind mount or named volume, all data is lost when the container is removed. Ensure the compose file includes a volume mount for /data pointing to a host directory.

default_config:
  compose_template: |
    services:
      timetagger:
        image: ghcr.io/timetagger/timetagger:latest
        container_name: timetagger
        restart: unless-stopped
        environment:
          TIMETAGGER_PORT: 8000
        volumes:
          - ${CONFIG_PATH:-./data}:/data
        ports:
          - "8000:8000/tcp"
  required_vars:
    - name: CONFIG_PATH
      description: Host path for /data (time entries and configuration)
      default: "./data"
  known_mounts:
    - container_path: /data
      purpose: TimeTagger data storage (time entries, user data, configuration)
      recommended_permissions: "755"
      owner: "1000:1000"

notes: |
  TimeTagger is a lightweight, web-based time tracking application. It stores all data locally in a JSON-based format.

  Data storage: All time tracking data is stored in /data directory. Ensure this is mapped to a persistent host volume to avoid data loss.

  Port: TimeTagger listens on port 8000 by default. This can be changed via environment variable if needed.

  Backup: Regularly back up the /data directory to prevent loss of time tracking history.

  User data: TimeTagger uses simple JSON files for storage, making it easy to inspect and back up data.
