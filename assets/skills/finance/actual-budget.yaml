id: actual-budget
name: Actual Budget Personal Finance
version: "1.0"
container_match:
  image_patterns:
    - "actualbudget/actual-server"
  port_hints: [5006]
category: finance
description: Community-maintained zero-based budgeting tool with local data storage and sync
docs_url: https://actualbudget.org/docs

common_issues:
  - id: server-startup-database-init
    name: Server fails to start — database initialization missing or corrupt
    symptoms:
      - "Database error on startup"
      - "Cannot initialize budget file"
      - "SQLite error: database is locked"
      - "Server exits with database connection failed"
      - "Port 5006 not responding"
    trigger_conditions:
      - log_pattern: "database.*error"
      - log_pattern: "sqlite.*locked"
    steps:
      - id: step-1
        description: Check if budget data directory exists and is accessible
        type: check
        command: "ls -la {data_path}"
        expected_output: ""
        on_fail: step-2
      - id: step-2
        description: Display current data directory status
        type: inform
        command: ""
      - id: step-3
        description: Verify Actual Budget server process and database state
        type: check
        command: "docker logs {container_name} | grep -i 'database\\|error\\|initialized' | tail -10"
        expected_output: ""
      - id: step-4
        description: Check for corrupted database file (size check)
        type: check
        command: "test -f {data_path}/server.sqlite && ls -lh {data_path}/server.sqlite"
        expected_output: ""
      - id: step-5
        description: Restart Actual Budget server to reinitialize database
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Wait for server initialization and verify startup
        type: check
        command: "sleep 10 && docker logs {container_name} | grep -i 'listening\\|ready\\|initialized' | tail -3"
    resolution: |
      The Actual Budget server database has been reinitialized. The application will create or restore its budget database on startup. If data loss occurred, restore from the most recent backup of {data_path}/server.sqlite. Future backups are strongly recommended before any maintenance.

  - id: data-sync-failed-mobile
    name: Mobile app cannot sync or fails with "connection refused"
    symptoms:
      - "Mobile app shows sync error"
      - "Cannot pull budget from server"
      - "Connection refused when accessing server URL"
      - "401 Unauthorized error from mobile client"
      - "Sync constantly retrying, never succeeds"
    trigger_conditions:
      - log_pattern: "connection.*refused"
      - log_pattern: "unauthorized"
    steps:
      - id: step-1
        description: Verify Actual Budget server is running and accessible
        type: check
        command: "docker ps | grep {container_name}"
        expected_output: "{container_name}"
        on_fail: step-2
      - id: step-2
        description: Check server container status
        type: inform
        command: ""
      - id: step-3
        description: Test server connectivity on port 5006
        type: check
        command: "docker exec {container_name} ss -tlnp | grep 5006"
        expected_output: "LISTEN"
        on_fail: step-4
      - id: step-4
        description: Check port mapping in docker inspect
        type: check
        command: "docker inspect {container_name} | grep -A 3 '5006'"
        expected_output: "5006"
      - id: step-5
        description: Verify server sync token is configured in mobile app
        type: inform
        command: ""
      - id: step-6
        description: Check server logs for sync errors or authentication failures
        type: check
        command: "docker logs {container_name} | grep -i 'sync\\|auth\\|token' | tail -10"
        expected_output: ""
      - id: step-7
        description: Restart server to clear stale sync state
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-8
      - id: step-8
        description: Verify server is ready for mobile sync
        type: check
        command: "sleep 10 && docker logs {container_name} | grep -i 'listening\\|ready' | tail -2"
    resolution: |
      The Actual Budget server has been restarted to clear stale sync sessions. Mobile apps should reconnect and resume syncing within 1-2 minutes. If sync fails after restart, verify the mobile app has the correct server URL and sync token configured. Reset the sync token in Settings → Sync if issues persist.

  - id: disk-space-budget-file-corruption
    name: Budget file corrupted or disk space exhausted — all budget data inaccessible
    symptoms:
      - "No budgets displayed in web UI"
      - "Server shows 'out of disk space' error"
      - "Cannot open budget file"
      - "Sync token generation fails"
      - "500 error when accessing any budget"
    trigger_conditions:
      - log_pattern: "disk.*full"
      - log_pattern: "corruption"
    steps:
      - id: step-1
        description: Check disk space available on host
        type: check
        command: "df -h {data_path} | tail -1"
        expected_output: ""
      - id: step-2
        description: Display disk usage details
        type: inform
        command: ""
      - id: step-3
        description: Check size of budget database file
        type: check
        command: "du -sh {data_path}/* | sort -h"
        expected_output: ""
      - id: step-4
        description: Verify if backups exist for recovery
        type: check
        command: "ls -lh {data_path}/.backup* {data_path}/server.sqlite.* 2>/dev/null | head -10"
        expected_output: ""
      - id: step-5
        description: Check server logs for corruption indication
        type: check
        command: "docker logs {container_name} | grep -i 'corrupt\\|invalid\\|error' | tail -5"
        expected_output: ""
      - id: step-6
        description: Stop server to prevent further writes during recovery assessment
        type: fix
        command: "docker stop {container_name}"
        requires_approval: true
        on_success: step-7
      - id: step-7
        description: Display backup and recovery instructions
        type: inform
        command: ""
      - id: step-8
        description: Restart server after verification
        type: fix
        command: "docker start {container_name}"
        requires_approval: true
        on_success: step-9
      - id: step-9
        description: Verify server recovered and budgets are accessible
        type: check
        command: "sleep 15 && docker logs {container_name} | tail -10"
    resolution: |
      The Actual Budget server has been recovered. If disk space was the issue, clean up old data or expand storage. If data corruption occurred, restore from the most recent backup. Manual recovery may require database repair tools — consult the official Actual Budget documentation for detailed recovery procedures if the server remains inaccessible after restart.

  - id: budget-import-export-failure
    name: Cannot import budget from backup or export budget data
    symptoms:
      - "Import shows 'invalid file format'"
      - "Export button unavailable or times out"
      - "Backup file rejected by import dialog"
      - "Export completes but downloaded file is empty or corrupt"
    trigger_conditions:
      - log_pattern: "import.*fail"
      - log_pattern: "export.*error"
    steps:
      - id: step-1
        description: Verify backup file format and integrity
        type: check
        command: "file {backup_file}"
        expected_output: ""
      - id: step-2
        description: Check file size and modification date
        type: check
        command: "ls -lh {backup_file}"
        expected_output: ""
      - id: step-3
        description: Check server logs for import/export errors
        type: check
        command: "docker logs {container_name} | grep -i 'import\\|export' | tail -10"
        expected_output: ""
      - id: step-4
        description: Verify server has sufficient disk space for export operation
        type: check
        command: "df -h {data_path} | tail -1"
        expected_output: ""
      - id: step-5
        description: Restart server to clear any stuck import/export processes
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-6
      - id: step-6
        description: Verify server is ready for import/export operations
        type: check
        command: "sleep 10 && docker logs {container_name} | grep -i 'listening\\|ready' | tail -2"
    resolution: |
      The Actual Budget server has been restarted. Import/export operations should now be available. For backup files from older versions, ensure they are compatible with the currently running Actual Budget version. If issues persist, verify the backup file is a valid Actual Budget export (typically a compressed archive or SQL dump format).

default_config:
  compose_template: |
    services:
      actual-budget:
        image: actualbudget/actual-server:latest
        container_name: actual-budget
        restart: unless-stopped
        environment:
          TZ: ${TZ:-UTC}
          ACTUAL_PORT: ${ACTUAL_PORT:-5006}
        volumes:
          - ${DATA_PATH:-./data}:/data
        ports:
          - "5006:5006"

  required_vars:
    - name: TZ
      description: Timezone for budget timestamps
      default: "UTC"
    - name: ACTUAL_PORT
      description: Port for Actual Budget web interface
      default: "5006"
    - name: DATA_PATH
      description: Host path for budget database and sync data
      default: "./data"

  known_mounts:
    - container_path: /data
      purpose: Budget database file (server.sqlite), sync tokens, and backup files
      recommended_permissions: "755"
      owner: "root:root"

linuxserver_conventions:
  enabled: false

notes: |
  Actual Budget is a community-maintained zero-based budgeting app. Unlike cloud-based tools, all budget data stays on your server.

  **Version notes:**
  Actual Budget is actively developed. Major version updates may require a fresh database migration. The official image is actualbudget/actual-server. Older community forks exist but are no longer maintained — use only the official image.

  **First-run workflow:**
  1. Start container
  2. Access web UI at http://localhost:5006
  3. Create a new budget file or import from backup
  4. Configure sync token in Settings → Sync
  5. Install mobile app (iOS/Android) and enter sync token to enable sync

  **Sync token security:**
  The sync token is your password to the server. Keep it private — anyone with this token can access your budget data. Change it if you suspect it has been compromised.

  **Backup strategy:**
  Regularly export your budget file from the UI. The backup includes all transactions, budgets, and accounts. Store backups securely.

  **Multi-user:**
  Actual Budget is designed for single-user deployments. For household budgets with multiple people, share the sync token among family members — all edits sync to everyone.

  **Common gotchas:**
  - Sync token expires if not used for an extended period — regenerate in Settings if mobile app loses connection
  - Disk space: large multi-year budgets can grow to 50+ MB; monitor available space
  - Browser cache: old budget versions cached in browser; clear cache if UI shows stale data
  - Import format: only import .zip or .db backups created by Actual Budget export
