id: fireflyiii
name: Firefly III Personal Finance Manager
version: "1.0"
container_match:
  image_patterns:
    - "fireflyiii/core"
  port_hints: [8080]
category: finance
description: Open-source personal finance manager for budgeting, expense tracking, and financial planning
docs_url: https://docs.firefly-iii.org/

common_issues:
  - id: missing-app-key
    name: Application key not set — Firefly III will not start
    symptoms:
      - "APP_KEY must be set"
      - "No encryption key configured"
      - "Application error — encryption unavailable"
      - "Fatal error on startup"
    trigger_conditions:
      - log_pattern: "APP_KEY.*not.*set"
      - log_pattern: "encryption.*unavailable"
    steps:
      - id: step-1
        description: Check if APP_KEY environment variable is set
        type: check
        command: "docker inspect {container_name} --format='{{json .Config.Env}}' | grep APP_KEY"
        expected_output: "APP_KEY"
        on_fail: step-2
      - id: step-2
        description: Display current environment configuration
        type: inform
        command: ""
      - id: step-3
        description: Generate a new APP_KEY using PHP artisan
        type: fix
        command: "docker exec {container_name} php artisan key:generate --show"
        requires_approval: true
        on_success: step-4
      - id: step-4
        description: Verify APP_KEY was generated and set
        type: check
        command: "docker inspect {container_name} --format='{{json .Config.Env}}' | grep -o 'APP_KEY=[^ ]*' | cut -d= -f2 | wc -c"
        expected_output: "[3-9]"
    resolution: |
      The APP_KEY is required for Firefly III's encryption functionality. The key has been generated and set. The container must be restarted for the new environment variable to take effect.

  - id: database-connection-failed
    name: Cannot connect to PostgreSQL or MySQL database
    symptoms:
      - "SQLSTATE[HY000]"
      - "Access denied for user"
      - "Connection refused"
      - "Database connection error"
      - "Doctrine DBAL connection failed"
    trigger_conditions:
      - log_pattern: "SQLSTATE"
      - log_pattern: "Connection refused"
    steps:
      - id: step-1
        description: Verify database container is running
        type: check
        command: "docker ps | grep -E 'postgres|mysql|mariadb'"
        expected_output: "postgres|mysql|mariadb"
        on_fail: step-2
      - id: step-2
        description: Display running database containers
        type: inform
        command: ""
      - id: step-3
        description: Check Firefly III database environment variables
        type: check
        command: "docker inspect {container_name} --format='{{json .Config.Env}}' | grep -i 'db_host\\|db_database\\|db_username'"
        expected_output: "DB_HOST"
        on_fail: step-4
      - id: step-4
        description: Display current database configuration
        type: inform
        command: ""
      - id: step-5
        description: Test database connectivity from Firefly III container
        type: check
        command: "docker exec {container_name} php artisan tinker --execute='DB::connection()->getPdo();' 2>&1 | head -5"
        expected_output: ""
        on_fail: step-6
      - id: step-6
        description: Verify database name and credentials are correct
        type: check
        command: "docker exec {database_container} mysql -u {db_user} -p{db_password} -e 'SELECT 1;' 2>&1"
        expected_output: "1"
        on_fail: step-7
      - id: step-7
        description: Restart Firefly III to reconnect to database
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-8
      - id: step-8
        description: Wait and verify database connection succeeded
        type: check
        command: "sleep 10 && docker logs {container_name} | grep -i 'database.*connected\\|successful' | tail -2"

  - id: web-interface-unreachable
    name: Web interface returns 404 or connection refused on port 8080
    symptoms:
      - "404 Not Found"
      - "Connection refused on port 8080"
      - "Cannot connect to http://host:8080"
      - "Blank white page on load"
    trigger_conditions:
      - log_pattern: "404"
      - log_pattern: "refused.*8080"
    steps:
      - id: step-1
        description: Verify Firefly III is listening on port 8080
        type: check
        command: "docker exec {container_name} ss -tlnp | grep 8080"
        expected_output: "LISTEN"
        on_fail: step-2
      - id: step-2
        description: Check port mapping in docker inspect
        type: check
        command: "docker inspect {container_name} | grep -A 3 '8080/tcp'"
        expected_output: "8080"
        on_fail: step-3
      - id: step-3
        description: Display port configuration
        type: inform
        command: ""
      - id: step-4
        description: Check Firefly III startup logs for errors
        type: check
        command: "docker logs {container_name} | grep -i 'error\\|failed' | head -10"
        expected_output: ""
      - id: step-5
        description: Verify APP_KEY and database connection
        type: check
        command: "docker logs {container_name} | tail -20"
        expected_output: ""
      - id: step-6
        description: Restart Firefly III
        type: fix
        command: "docker restart {container_name}"
        requires_approval: true
        on_success: step-7
      - id: step-7
        description: Wait and verify web interface is accessible
        type: check
        command: "sleep 15 && docker logs {container_name} | grep -i 'running\\|listening' | tail -2"

  - id: migration-failed-on-startup
    name: Database migration fails on startup — schema not initialized
    symptoms:
      - "Migration error"
      - "SQLSTATE error during migration"
      - "Schema table not found"
      - "Doctrine migration failed"
      - "Database not properly initialized"
    trigger_conditions:
      - log_pattern: "migration.*fail"
      - log_pattern: "schema.*not.*found"
    steps:
      - id: step-1
        description: Check database migration status in logs
        type: check
        command: "docker logs {container_name} | grep -i 'migration' | head -10"
        expected_output: ""
      - id: step-2
        description: Display migration error details
        type: inform
        command: ""
      - id: step-3
        description: Verify database is accessible and empty
        type: check
        command: "docker exec {database_container} mysql -u {db_user} -p{db_password} {database_name} -e 'SHOW TABLES;' 2>&1"
        expected_output: ""
      - id: step-4
        description: Run database migrations manually via Artisan
        type: fix
        command: "docker exec {container_name} php artisan migrate --force"
        requires_approval: true
        on_success: step-5
      - id: step-5
        description: Verify migrations completed successfully
        type: check
        command: "docker logs {container_name} | grep -i 'migration.*success\\|migrated' | tail -5"

default_config:
  compose_template: |
    services:
      fireflyiii:
        image: fireflyiii/core:latest
        container_name: fireflyiii
        restart: unless-stopped
        environment:
          APP_KEY: ${APP_KEY}
          APP_URL: ${APP_URL:-http://localhost:8080}
          DB_HOST: ${DB_HOST:-postgres}
          DB_PORT: ${DB_PORT:-5432}
          DB_DATABASE: ${DB_DATABASE:-firefly}
          DB_USERNAME: ${DB_USERNAME:-firefly}
          DB_PASSWORD: ${DB_PASSWORD:-firefly}
          DB_CONNECTION: ${DB_CONNECTION:-pgsql}
          TRUSTED_PROXIES: ${TRUSTED_PROXIES:-'*'}
          LOG_CHANNEL: ${LOG_CHANNEL:-stack}
        volumes:
          - ${UPLOAD_PATH:-./upload}:/var/www/html/storage/upload
          - ${EXPORT_PATH:-./export}:/var/www/html/storage/export
        ports:
          - "8080:8080"
        depends_on:
          postgres:
            condition: service_healthy

      postgres:
        image: postgres:15-alpine
        container_name: fireflyiii-postgres
        restart: unless-stopped
        environment:
          POSTGRES_DB: ${POSTGRES_DB:-firefly}
          POSTGRES_USER: ${POSTGRES_USER:-firefly}
          POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firefly}
        volumes:
          - ${DB_PATH:-./postgres-data}:/var/lib/postgresql/data
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U firefly"]
          interval: 10s
          timeout: 5s
          retries: 5

  required_vars:
    - name: APP_KEY
      description: Encryption key for Firefly III (generate with docker exec fireflyiii php artisan key:generate --show)
      default: ""
    - name: APP_URL
      description: External URL for Firefly III (e.g., http://localhost:8080 or https://firefly.example.com)
      default: "http://localhost:8080"
    - name: DB_HOST
      description: PostgreSQL hostname
      default: "postgres"
    - name: DB_PORT
      description: PostgreSQL port
      default: "5432"
    - name: DB_DATABASE
      description: Database name
      default: "firefly"
    - name: DB_USERNAME
      description: Database user
      default: "firefly"
    - name: DB_PASSWORD
      description: Database password
      default: "firefly"
    - name: DB_CONNECTION
      description: Database driver (pgsql or mysql)
      default: "pgsql"
    - name: UPLOAD_PATH
      description: Host path for uploaded attachments
      default: "./upload"
    - name: EXPORT_PATH
      description: Host path for exported reports
      default: "./export"
    - name: DB_PATH
      description: Host path for PostgreSQL data
      default: "./postgres-data"

  known_mounts:
    - container_path: /var/www/html/storage/upload
      purpose: User-uploaded attachments and documents
      recommended_permissions: "755"
      owner: "www-data:www-data"
    - container_path: /var/www/html/storage/export
      purpose: Exported reports and transaction files
      recommended_permissions: "755"
      owner: "www-data:www-data"

linuxserver_conventions:
  enabled: false

notes: |
  Firefly III is a free and open-source personal finance manager. It supports PostgreSQL and MySQL databases.

  **APP_KEY generation:**
  The APP_KEY is required for encryption. Generate it once using:
  ```
  docker exec fireflyiii php artisan key:generate --show
  ```
  Copy the output value and set it as the APP_KEY environment variable before first startup.

  **Database selection:**
  PostgreSQL is recommended for reliability and performance. MySQL/MariaDB are also supported. Set DB_CONNECTION accordingly (pgsql or mysql).

  **First-run workflow:**
  1. Set APP_KEY, DB_HOST, DB_DATABASE, DB_USERNAME, DB_PASSWORD
  2. Start containers (database runs migrations automatically on first start)
  3. Wait for database to be healthy (check docker logs)
  4. Access Firefly III at http://localhost:8080
  5. Create admin account on first login
  6. Configure currencies, accounts, and import rules

  **Backups:**
  Regularly export your data via the Firefly III export feature. Back up the PostgreSQL database separately using `pg_dump`.

  **Common gotchas:**
  - APP_KEY not set: Firefly III will refuse to start
  - Database migrations fail: Ensure database is accessible and empty on first startup
  - Web interface blank: Check logs for APP_KEY or database connection errors
