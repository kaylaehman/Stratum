syntax = "proto3";

package stratum.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/KAE-Labs/stratum/proto/gen/stratum/v1;stratumv1";

// AgentService is the gRPC contract between the Stratum backend and the
// per-host agent.
service AgentService {
  // Ping is a liveness check. The agent echoes the nonce and reports its
  // version so the backend can confirm connectivity and compatibility.
  rpc Ping(PingRequest) returns (PingResponse);

  // WatchFiles opens a server-streaming RPC that delivers real-time file
  // change events for the requested paths. The stream remains open until the
  // client cancels or the connection is lost.
  rpc WatchFiles(WatchFilesRequest) returns (stream WatchFilesResponse);

  // DetectInit reports which init system is active on the host. The backend
  // persists the result into node capabilities_json.
  rpc DetectInit(DetectInitRequest) returns (DetectInitResponse);
}

message PingRequest {
  // Opaque value echoed back by the agent to correlate request/response.
  string nonce = 1;
}

message PingResponse {
  // The nonce from the request, echoed unchanged.
  string nonce = 1;
  // Agent build version (semver or git describe).
  string agent_version = 2;
}

// DetectInitRequest is the input for DetectInit (no fields needed).
message DetectInitRequest {}

// WatchFilesRequest specifies which paths to watch and whether to recurse into
// subdirectories.
message WatchFilesRequest {
  // Absolute paths on the agent host to monitor.
  repeated string paths = 1;
  // When true, subdirectories under each path are also watched.
  bool recursive = 2;
}

// FileEventType classifies the filesystem change.
enum FileEventType {
  FILE_EVENT_TYPE_UNSPECIFIED = 0;
  FILE_EVENT_TYPE_CREATE = 1;
  FILE_EVENT_TYPE_MODIFY = 2;
  FILE_EVENT_TYPE_DELETE = 3;
  FILE_EVENT_TYPE_RENAME = 4;
  FILE_EVENT_TYPE_ATTRIB = 5;
}

// WatchFilesResponse is one filesystem notification streamed from agent to
// backend.
message WatchFilesResponse {
  // Absolute path of the changed file or directory.
  string path = 1;
  // The kind of change observed.
  FileEventType event_type = 2;
  // Wallclock time on the agent host when the event was observed.
  google.protobuf.Timestamp timestamp = 3;
  // True when the path refers to a directory rather than a file.
  bool is_dir = 4;
}

// InitSystem identifies which init/service-manager is active on the host.
enum InitSystem {
  INIT_SYSTEM_UNSPECIFIED = 0;
  INIT_SYSTEM_SYSTEMD = 1;
  INIT_SYSTEM_OPENRC = 2;
  INIT_SYSTEM_OTHER = 3;
}

// DetectInitResponse is the response from DetectInit.
message DetectInitResponse {
  // The detected init system.
  InitSystem init_system = 1;
  // Human-readable description (e.g. "systemd 252", "openrc 0.44").
  string description = 2;
}
