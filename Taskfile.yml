version: "3"

# Stratum cross-platform task runner (go-task). Works on the Windows dev host
# and Linux CI. See docs/superpowers/specs for the per-sub-project build plan.

tasks:
  default:
    cmds:
      - task --list

  proto:gen:
    desc: Regenerate Go from proto/ via buf (commit the result)
    dir: proto
    cmds:
      - buf generate

  proto:lint:
    dir: proto
    cmds:
      - buf lint

  backend:build:
    desc: Build the backend binary
    dir: backend
    cmds:
      - go build -o bin/stratum ./...

  backend:test:
    desc: Run backend tests with the race detector
    dir: backend
    cmds:
      - go test -race ./...

  backend:vet:
    dir: backend
    cmds:
      - go vet ./...

  backend:run:
    desc: Run the backend (uses .env / environment)
    dir: backend
    cmds:
      - go run .

  agent:build:
    dir: agent
    cmds:
      - go build -o bin/stratum-agent ./...

  agent:test:
    dir: agent
    cmds:
      - go test ./...

  frontend:dev:
    desc: Start the Vite dev server
    dir: frontend
    cmds:
      - npm run dev

  frontend:build:
    dir: frontend
    cmds:
      - npm run build

  frontend:check:
    dir: frontend
    cmds:
      - npm run typecheck
      - npm run lint

  frontend:test:
    desc: Run the frontend unit tests (Vitest)
    dir: frontend
    cmds:
      - npm run test

  skills:validate:
    desc: Validate the service-skill catalog (schema + risk gating)
    dir: backend
    cmds:
      - go test ./skills/... -run TestValidateCatalog -count=1

  test:
    desc: Run all backend + agent tests
    cmds:
      - task: backend:test
      - task: agent:test

  seed:demo:
    desc: Populate a throwaway SQLite DB with fake demo data (never touches real infra)
    dir: backend
    vars:
      DEMO_DB_PATH: '{{.DEMO_DB_PATH | default "C:/Users/kayla/Projects/Stratum/.demo/stratum-demo.db"}}'
      DEMO_ENC_KEY: '{{.ENCRYPTION_KEY | default "09ac40ae1f3604f38e843215752593e099fd71e6b9a488b99887651176909c76"}}'
    cmds:
      - mkdir -p ../.demo
      - cmd: >-
          DATABASE_URL=sqlite:///{{.DEMO_DB_PATH}}
          ENCRYPTION_KEY={{.DEMO_ENC_KEY}}
          GOWORK=off go run ./cmd/seeddemo
        silent: false
    notes: |
      Demo env:
        DATABASE_URL=sqlite:///C:/Users/kayla/Projects/Stratum/.demo/stratum-demo.db
        ENCRYPTION_KEY=09ac40ae1f3604f38e843215752593e099fd71e6b9a488b99887651176909c76
      Printed creds: demo-admin / demo-admin-pw  TOTP: JBSWY3DPEHPK3PXP
      Expects a fresh DB — delete .demo/stratum-demo.db before re-seeding.

  dev:
    desc: Run backend + frontend dev servers (use two terminals or a runner)
    cmds:
      - echo "Run 'task backend:run' and 'task frontend:dev' in separate terminals"
